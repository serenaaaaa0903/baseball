<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIS | AI Swing Diagnostics</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="main.js" type="module"></script>
</head>
<body class="bg-[#020408] text-white font-['Inter'] selection:bg-blue-500/30">
    <div class="noise-overlay"></div>
    <div class="ambient-glow"></div>

    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="p-6 flex justify-between items-center relative z-50">
            <div class="flex flex-col">
                <span class="proto-font text-2xl font-black italic tracking-tighter">AIS <span class="text-blue-500">DIAGNOSTICS</span></span>
                <span class="text-[8px] font-extrabold text-slate-500 uppercase tracking-[0.4em] mt-1">Next-Gen Scouting Intelligence</span>
            </div>
            <div class="flex gap-4">
                <button id="uploadBtn" class="btn-primary">UPLOAD VIDEO</button>
                <button id="reportBtn" class="btn-secondary">GENERATE REPORT</button>
                <input type="file" id="fileInput" accept="video/*" class="hidden">
            </div>
        </header>

        <!-- Main Dashboard -->
        <main class="flex-1 grid grid-cols-1 lg:grid-cols-[1.2fr,0.8fr] gap-6 p-6 pt-0 relative z-10">
            <!-- Left: Video Panel -->
            <section class="dashboard-card overflow-hidden flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-label">Live Video Stream</span>
                    <div class="status-badge active-status">Tracking v4.2 Active</div>
                </div>
                <div class="video-container flex-1 bg-black rounded-2xl relative">
                    <video id="input_video" class="hidden"></video>
                    <canvas id="output_canvas" class="w-full h-full object-contain rounded-2xl"></canvas>
                    <div id="videoOverlay" class="absolute inset-0 flex items-center justify-center bg-black/40 backdrop-blur-sm pointer-events-none transition-opacity duration-500">
                        <p class="text-slate-400 text-sm font-medium">Please upload a video for analysis</p>
                    </div>
                </div>
            </section>

            <!-- Right: Data Panel -->
            <section class="flex flex-col gap-6">
                <!-- Scouting Grade -->
                <div class="dashboard-card flex flex-col justify-center items-center py-8">
                    <span class="text-label mb-2">Final Scouting Grade</span>
                    <scouting-grade score="59" total="80"></scouting-grade>
                </div>

                <!-- Metrics Grid -->
                <div class="grid grid-cols-2 gap-4">
                    <metric-card label="ARM-ANG" value="142.5" unit="°" trend="up" inset-img="https://placehold.co/100x100/0c111d/3b82f6?text=ARM"></metric-card>
                    <metric-card label="KNEE-DRV" value="88.2" unit="°" trend="stable" inset-img="https://placehold.co/100x100/0c111d/3b82f6?text=KNEE"></metric-card>
                    <metric-card label="TORQUE" value="1240" unit="N/m" trend="up" inset-img="https://placehold.co/100x100/0c111d/3b82f6?text=TORQUE"></metric-card>
                    <metric-card label="FOOT-FIX" value="98" unit="%" trend="up" inset-img="https://placehold.co/100x100/0c111d/3b82f6?text=FOOT"></metric-card>
                </div>

                <!-- Director's Verdict -->
                <div class="dashboard-card flex-1 flex flex-col">
                    <span class="text-label mb-4">Director's Verdict</span>
                    <div id="verdictBox" class="flex-1 bg-white/5 rounded-xl p-4 border border-white/5 text-sm leading-relaxed text-slate-300">
                        <p class="mb-2">임팩트 시 하체 고정력이 우수함 (FOOT-FIX: 98%).</p>
                        <p class="mb-2">팔의 각도가 다소 높게 형성되어 스윙 궤적이 가파릅니다 (ARM-ANG: 142.5°).</p>
                        <p>토크 발생 시 골반의 회전력이 인상적이며, 에너지가 효율적으로 전달되고 있습니다.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
